name: Build and Release

on:
  workflow_dispatch:
    inputs:
      lattice_ref:
        description: Lattice tag to build and release (e.g. v0.8.5)
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LATTICE_REF: ${{ github.event.inputs.lattice_ref }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Build linux-x86_64
    runs-on: ubuntu-latest
    container:
      image: crystallang/crystal:latest-alpine

    steps:
      - name: Checkout lattice
        run: |
          apk add --no-cache git
          git clone --depth=1 --branch "$LATTICE_REF" \
            "https://codeberg.org/DaZhi-the-Revelator/lattice.git" lattice
          cd lattice && git submodule update --init --recursive

      - name: Install dependencies
        working-directory: lattice
        run: shards install --production

      - name: Build
        working-directory: lattice
        run: shards build --production --release --static --no-debug

      - name: Verify binary
        working-directory: lattice
        run: ./bin/lattice --version

      - name: Stage archive
        working-directory: lattice
        run: |
          mkdir -p staging
          cp bin/lattice staging/
          cp README.md LICENSE staging/
          tar -czf ../lattice-linux-x86_64.tar.gz -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-x86_64
          path: lattice-linux-x86_64.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build windows-x86_64
    runs-on: windows-latest

    steps:
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Verify Crystal version
        run: crystal --version

      - name: Checkout lattice
        run: |
          git clone --depth=1 --branch "$env:LATTICE_REF" `
            "https://codeberg.org/DaZhi-the-Revelator/lattice.git" lattice
          cd lattice
          git submodule update --init --recursive

      - name: Install dependencies
        working-directory: lattice
        run: shards install --production

      - name: Build
        working-directory: lattice
        run: shards build --production --release --no-debug

      - name: Verify binary
        working-directory: lattice
        run: .\bin\lattice.exe --version

      - name: Stage archive
        working-directory: lattice
        run: |
          mkdir staging
          copy bin\lattice.exe staging\
          copy README.md staging\
          copy LICENSE staging\
          Compress-Archive -Path staging\* -DestinationPath ..\lattice-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-x86_64
          path: lattice-windows-x86_64.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-15-intel
      fail-fast: false

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Verify Crystal version
        run: crystal --version

      - name: Checkout lattice
        run: |
          git clone --depth=1 --branch "$LATTICE_REF" \
            "https://codeberg.org/DaZhi-the-Revelator/lattice.git" lattice
          cd lattice && git submodule update --init --recursive

      - name: Install dependencies
        working-directory: lattice
        run: shards install --production

      - name: Install static libs
        run: brew install libgc pcre2

      - name: Build
        working-directory: lattice
        run: |
          GC_LIB=$(brew ls libgc | grep 'libgc\.a$' | head -1)
          PCRE_LIB=$(brew ls pcre2 | grep 'libpcre2-8\.a$' | head -1)
          unset PKG_CONFIG_PATH
          shards build --production --release --no-debug \
            --link-flags="$GC_LIB $PCRE_LIB"

      - name: Verify binary
        working-directory: lattice
        run: |
          file bin/lattice
          bin/lattice --version

      - name: Stage archive
        working-directory: lattice
        run: |
          mkdir -p staging
          cp bin/lattice staging/
          cp README.md LICENSE staging/
          tar -czf ../lattice-macos-${{ matrix.arch }}.tar.gz -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-${{ matrix.arch }}
          path: lattice-macos-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    name: Create Codeberg Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lattice CHANGELOG
        run: |
          git clone --depth=1 --branch "$LATTICE_REF" \
            "https://codeberg.org/DaZhi-the-Revelator/lattice.git" lattice

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
            -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Extract changelog body
        id: changelog
        run: |
          TAG="${{ github.event.inputs.lattice_ref }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          python3 - "${TAG}" <<'PYEOF' > body.txt
          import sys, re, pathlib

          tag = sys.argv[1]
          text = pathlib.Path("lattice/CHANGELOG.md").read_text(encoding="utf-8")

          pattern = rf"(?m)^## \[{re.escape(tag)}\].*?\n(.*?)(?=^## \[|\Z)"
          m = re.search(pattern, text, re.DOTALL)

          print(m.group(1).strip() if m else "")
          PYEOF

          echo "Body extracted: $(wc -c < body.txt) bytes"

      - name: Create Codeberg release and upload assets
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          TAG: ${{ steps.changelog.outputs.tag }}
          API: https://codeberg.org/api/v1
          REPO: DaZhi-the-Revelator/lattice
        run: |
          set -e

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${CODEBERG_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary "$(jq -n \
              --arg tag "${TAG}" \
              --rawfile body body.txt \
              '{tag_name:$tag,name:$tag,body:$body,draft:false,prerelease:false}')" \
            "${API}/repos/${REPO}/releases")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: ${HTTP_CODE}"
          echo "Response body: ${BODY}"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Error: Codeberg API returned HTTP ${HTTP_CODE}"
            exit 1
          fi

          RELEASE_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          

          echo "Release ID: ${RELEASE_ID}"

          for asset in release-assets/*; do
            name=$(basename "$asset")
            echo "Uploading ${name}..."
            curl -sf -X POST \
              -H "Authorization: token ${CODEBERG_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${asset}" \
              "${API}/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${name}"
          done

          echo "Release ${TAG} published to Codeberg."
